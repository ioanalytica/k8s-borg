# OpenSSH 10.1+ warns when a connection does not use a post-quantum key exchange
# ("store now, decrypt later" — see https://www.openssh.org/pq.html). This image
# backs up to servers that lack PQ KEX (e.g. a Hetzner Storage Box on OpenSSH
# 9.x), so silence just that one warning. Other weak-crypto warnings stay on.
#
# Borg 1 runs `ssh` (as root), which reads this system config; scope to specific
# hosts in ~/.ssh/config if you prefer. Borg 2 uses paramiko for sftp:// and
# never emits this warning.
Host *
    WarnWeakCrypto no-pq-kex
